[build]
  publish = "dist/"
  command = "echo 'No build step needed'"

# Production: auto-deploy on push to main
[context.production]
  publish = "dist/"

# Deploy Previews: auto-generated for every PR
[context.deploy-preview]
  publish = "dist/"

# Branch deploys: auto-deploy the dev branch
[context.branch-deploy]
  publish = "dist/"

# Serve .md files as plain text so fetch() can read them
[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/components/*/*.md"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Access-Control-Allow-Origin = "*"
